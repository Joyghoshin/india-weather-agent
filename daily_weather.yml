name: 🌦️ India Weather Agent — Daily Briefing

on:
  schedule:
    # Runs at 00:00 UTC = 05:30 AM IST every day
    - cron: '0 0 * * *'
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab
    inputs:
      dry_run:
        description: 'Dry run (skip sending email)?'
        required: false
        default: 'false'

jobs:
  weather-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🌦️ Run Weather Agent
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          GMAIL_SENDER:      ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DRY_RUN:           ${{ github.event.inputs.dry_run || 'false' }}
        run: python agent.py

      - name: 📤 Upload cached climatology (speeds up future runs)
        uses: actions/cache@v4
        with:
          path: models/
          key: climatology-cache-${{ runner.os }}-${{ hashFiles('weather_engine.py') }}
          restore-keys: |
            climatology-cache-${{ runner.os }}-
