name: 🌦️ India Weather Agent — Daily Briefing

on:
  schedule:
    - cron: '0 0 * * *'   # 05:30 AM IST daily
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip sending email)?'
        required: false
        default: 'false'

jobs:
  weather-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 25        # ← changed from 15 to 25

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # ✅ Restore cache BEFORE running the agent
      - name: ♻️ Restore climatology cache
        uses: actions/cache@v4
        with:
          path: models/
          key: climatology-cache-${{ runner.os }}-${{ hashFiles('weather_engine.py') }}
          restore-keys: |
            climatology-cache-${{ runner.os }}-

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🌦️ Run Weather Agent
        timeout-minutes: 20
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DRY_RUN:            ${{ github.event.inputs.dry_run || 'false' }}
        run: python -u agent.py   # ← added -u for live logs in GitHub Actions

      - name: 📁 Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weather-run-${{ github.run_number }}
          path: |
            *.log
            output/
          retention-days: 7

      - name: 🚨 Notify on failure
        if: failure()
        run: |
          echo "❌ Agent failed — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
